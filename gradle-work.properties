# Work machine user Gradle properties
#
# Move this file to:
#   C:/Users/<your-user>/.gradle/gradle.properties

org.gradle.java.installations.auto-detect=true

# Optional: uncomment if Gradle does not find the correct JDK automatically.
# org.gradle.java.home=C:/Java/jdk/17.0.12
# org.gradle.java.installations.paths=C:/java/jdk/21.0.7

# Corporate proxy
systemProp.http.proxyHost=GB3WSA-Intvip.corp.internal
systemProp.http.proxyPort=9480
systemProp.http.nonProxyHosts=*.nonproxyrepos.com|localhost
systemProp.https.proxyHost=GB3WSA-Intvip.corp.internal
systemProp.https.proxyPort=9480
systemProp.https.nonProxyHosts=*.nonproxyrepos.com|localhost

# Corporate SSL inspection trust
# Prefer a dedicated trust store path rather than a JDK-specific cacerts file.
systemProp.javax.net.ssl.trustStore=c:/Java/jdk/17.0.12/lib/security/cacerts
systemProp.javax.net.ssl.trustStorePassword=changeit
systemProp.javax.net.ssl.trustStoreType=JKS
